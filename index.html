<!DOCTYPE html>
<html lang="uz">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dice Game</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

  <div class="game"> 

    <h1>🎲 Dice Game</h1>

    <div class="players"> 

      <div class="player active" id="player-0">

        <h2>O'yinchi 1</h2>

        <div class="total-score" id="score-0">0</div>
        
        <div class="current">

          <div class="current-label">Hozirgi</div>

          <div class="current-score" id="current-0">0</div>

        </div>

      </div>

      <div class="player" id="player-1">

        <h2>O'yinchi 2</h2>

        <div class="total-score" id="score-1">0</div>

        <div class="current">

          <div class="current-label">Hozirgi</div>

          <div class="current-score" id="current-1">0</div>

        </div>

      </div>

    </div>

    <div class="dice-area">

      <img src="images/dice-1.png" alt="dice" class="dice hidden"  id="dice">

    </div>

    <div class="buttons">

      <button class="btn-new" id="btn-new"> Yangi o'yin</button>

      <button class="btn-roll" id="btn-roll"> Zar tashlash</button>

      <button class="btn-hold" id="btn-hold"> To'xtatish</button>

    </div>
    
  </div>

  <script src="script.js"></script>
  <script src="app.js"></script>
</body>

</html>
